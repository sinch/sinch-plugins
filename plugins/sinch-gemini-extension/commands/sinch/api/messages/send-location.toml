description = "Send a location message via Sinch Conversation API"

prompt = """
# Send Location Message

Send a location (latitude, longitude, optional label) to a recipient via the Sinch Conversation API. Supported on RCS, WhatsApp, and other channels that support location sharing.

**IMPORTANT: Execute this command directly. Do NOT generate script files. Perform the API call immediately.**

## Input

- `--to` / `-t`: Recipient phone number (E.164) - required
- `--lat` / `-y`: Latitude (decimal) - required
- `--lon` / `-x`: Longitude (decimal) - required
- `--label` / `-l`: Optional label for the location (e.g. "Store downtown")
- `--channel` / `-c`: Channel (RCS, WHATSAPP) - optional

Arguments: {{args}}

## Instructions

**Execute these steps directly - do not write code or scripts:**

0. If {{args}} empty: ask for recipient, latitude, longitude, and optional label. Otherwise parse.

1. Validate: --to (E.164), --lat (valid number -90 to 90), --lon (valid number -180 to 180). Optional: --label, --channel.

2. Try MCP tool `mcp__sinch__send-location-message` if available with recipient, lat, lon, label, channel. On success display result and exit.

3. If MCP not available: get CONVERSATION_* env vars. If missing, report "Sinch API is not configured."

4. Build message.location_message with latitude, longitude, and optional title (label). Recipient via channel_identities.

5. POST https://{region}.conversation.api.sinch.com/v1/projects/{projectId}/messages:send with OAuth2, body: app_id, recipient, message.

6. On success: "✅ Location message sent!" with message ID. Handle errors clearly.

7. Handle all errors gracefully.

## Examples

```
/sinch:api:messages:send-location --to=+14155551234 --lat=37.7749 --lon=-122.4194
/sinch:api:messages:send-location -t +14155551234 -y 55.61 -x 13.00 --label="Sinch HQ"
```

## API Reference

- **MCP Tool**: `mcp__sinch__send-location-message`
- **API Endpoint**: POST /v1/projects/{projectId}/messages:send
- **Message type**: location_message (latitude, longitude, title)
- **Documentation**: https://developers.sinch.com/docs/conversation/message-types

## Notes

- Not all channels support location; RCS and WhatsApp typically do. Unsupported channels may return an error.
"""
